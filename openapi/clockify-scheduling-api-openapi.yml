        '201':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AssignmentDtoV1'
          description: Created
      summary: Create a recurring assignment
      tags:
      - Scheduling
      security:
      - ApiKeyAuth: []
      - AddonKeyAuth: []
  /v1/workspaces/{workspaceId}/scheduling/assignments/recurring/{assignmentId}:
    servers:
    - url: https://api.clockify.me/api
    delete:
      operationId: deleteRRecurringAssignment
      parameters:
      - description: Represents a workspace identifier across the system.
        example: 64a687e29ae1f428e7ebe303
        in: path
        name: workspaceId
        required: true
        schema:
          type: string
          description: Represents a workspace identifier across the system.
          example: 64a687e29ae1f428e7ebe303
      - description: Represents an assignment identifier across the system.
        example: 5b641568b07987035750505e
        in: path
        name: assignmentId
        required: true
        schema:
          type: string
          description: Represents an assignment identifier across the system.
          example: 5b641568b07987035750505e
      - description: Represents a series option.
        example: ALL
        in: query
        name: seriesUpdateOption
        required: false
        schema:
          type: string
          enum:
          - THIS_ONE
          - THIS_AND_FOLLOWING
          - ALL
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AssignmentDtoV1'
          description: OK
      summary: Delete a recurring assignment
      tags:
      - Scheduling
      security:
      - ApiKeyAuth: []
      - AddonKeyAuth: []
    patch:
      operationId: editRecurring
      parameters:
      - description: Represents a workspace identifier across the system.
        example: 64a687e29ae1f428e7ebe303
        in: path
        name: workspaceId
        required: true
        schema:
          type: string
          description: Represents a workspace identifier across the system.
          example: 64a687e29ae1f428e7ebe303
      - description: Represents an assignment identifier across the system.
        example: 5b641568b07987035750505e
        in: path
        name: assignmentId
        required: true
        schema:
          type: string
          description: Represents an assignment identifier across the system.
          example: 5b641568b07987035750505e
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignmentUpdateRequestV1'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AssignmentDtoV1'
          description: OK
      summary: Update a recurring assignment
      tags:
      - Scheduling
      security:
      - ApiKeyAuth: []
      - AddonKeyAuth: []
  /v1/workspaces/{workspaceId}/scheduling/assignments/series/{assignmentId}:
    servers:
