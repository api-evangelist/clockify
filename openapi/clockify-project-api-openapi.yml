          type: string
          description: Represents a workspace identifier across the system.
          example: 64a687e29ae1f428e7ebe303
      - description: Represents a project identifier across the system.
        example: 5b641568b07987035750505e
        in: path
        name: projectId
        required: true
        schema:
          type: string
          description: Represents a project identifier across the system.
          example: 5b641568b07987035750505e
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDtoImplV1'
          description: OK
      summary: Delete a project from a workspace
      tags:
      - Project
      security:
      - ApiKeyAuth: []
      - AddonKeyAuth: []
    get:
      operationId: getProject
      parameters:
      - description: Represents a workspace identifier across the system.
        example: 64a687e29ae1f428e7ebe303
        in: path
        name: workspaceId
        required: true
        schema:
          type: string
          description: Represents a workspace identifier across the system.
          example: 64a687e29ae1f428e7ebe303
      - description: Represents a project identifier across the system.
        example: 5b641568b07987035750505e
        in: path
        name: projectId
        required: true
        schema:
          type: string
          description: Represents a project identifier across the system.
          example: 5b641568b07987035750505e
      - description: If set to true, results will contain additional information about the project
        in: query
        name: hydrated
        required: false
        schema:
          type: boolean
          description: If set to true, results will contain additional information about the project
          default: false
      - description: If provided, you'll get a filtered list of custom fields that matches the provided string with the custom field entity type.
        example: TIMEENTRY
        in: query
        name: custom-field-entity-type
        required: false
        schema:
          type: string
          default: TIMEENTRY
      - description: Represents the maximum number of expenses to fetch.
        example: 10
        in: query
        name: expense-limit
        required: false
        schema:
          type: integer
          description: Represents the maximum number of expenses to fetch.
          format: int32
          example: 10
          default: 20
      - description: If provided, you will get expenses dated before the provided value in yyyy-MM-dd format.
        example: '2024-12-31'
        in: query
        name: expense-date
        required: false
        schema:
          type: string
          description: If provided, you will get expenses dated before the provided value in yyyy-MM-dd format.
          example: '2024-12-31'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDtoV1'
          description: OK
      summary: Find a project by ID
      tags:
      - Project
      security:
      - ApiKeyAuth: []
      - AddonKeyAuth: []
    put:
      operationId: updateProject
      parameters:
      - description: Represents a workspace identifier across the system.
        example: 64a687e29ae1f428e7ebe303
        in: path
        name: workspaceId
        required: true
