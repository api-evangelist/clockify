        - TAG_UPDATED
        - TAG_DELETED
        - TASK_UPDATED
        - CLIENT_UPDATED
        - TASK_DELETED
        - CLIENT_DELETED
        - EXPENSE_RESTORED
        - ASSIGNMENT_CREATED
        - ASSIGNMENT_DELETED
        - ASSIGNMENT_PUBLISHED
        - ASSIGNMENT_UPDATED
        - EXPENSE_CREATED
        - EXPENSE_DELETED
        - EXPENSE_UPDATED
        - PROJECT_UPDATED
        - PROJECT_DELETED
        - USER_GROUP_CREATED
        - USER_GROUP_UPDATED
